<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="../css/styleform.css" />
 <script src="js/formjs.js"></script>

</head>
<body>
  <div class="container">
    <h1> Cadastro</h1>
  <form id="form">
  <div class="mb-3">
    <label for="Email" class="form-label">Email</label>
    <input type="email" class="form-control" id="Email" aria-describedby="emailHelp">
    <div id="emailHelp" class="form-text">Seu email esta seguro conosco.</div>
  </div>
  <div class="mb-3">
    <label for="Password" class="form-label">Senha</label>
    <input type="password" class="form-control" id="Password" aria-describedby="safepass">
  </div>
  <div class="select">
    <select class="escolhas" aria-label="Default select example">
  <option selected>...</option>
  <option value="1">One</option>
  <option value="2">Two</option>
  <option value="3">Three</option>
</select>
  </div>
   <div class="mb-3">
    <label for="exampleTEL" class="form-label">Numero de Telefone</label>
    <input type="number" class="form-control" id="exampleTEL" aria-describedby="telnumber">
    <div id="telnumber" class="form-text">Necessario para verificação de duas etapas e atualizações!.</div>
   </div>
  <button type="button" class="btn btn-primary" onclick="VerificarCadastro(event)">Cadastrar-se</button>
  <button type="button" class="btn btn-secondary" onclick="LimparCampos(event)">Apagar dados</button>
</form>
</div>
</div>
 <div class="resultado"></div>
  <script src="js/formjs.js"></script>
</body>
<footer>
    <p>Fim da Pagina Direitos reservados a AlguemAi</p>
</footer>
</html>
